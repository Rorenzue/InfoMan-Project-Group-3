<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NCIP Educational Assistance - Degree and School Preference</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/degreedesign.css">
</head>
<body>
    <header class="header">
        <a href="index.html">
            <img src="assets/images/img_logo.png" alt="NCIP Logo" class="logo">
        </a>
        <div class="header-text">
            <div class="registration-process">Registration Process</div>
            <div class="main-title">NCIP Educational Assistance</div>
        </div>
    </header>

    <div class="main-container">
        <nav class="sidebar">
            <ul>
                <li>
                    <span class="icon">👤</span>
                    <span>Personal</span>
                </li>
                <li>
                    <span class="icon">👥</span>
                    <span>Parent</span>
                </li>
                <li>
                    <span class="icon">📄</span>
                    <span>Educational<br>Background</span>
                </li>
                <li class="active">
                    <span class="icon">✎</span>
                    <span>Degree<br>and School<br>Preference</span>
                </li>
                <li>
                    <span class="icon">🔍</span>
                    <span>View and<br>Submit</span>
                </li>
            </ul>
        </nav>

        <main class="content">
            <div class="stepper">
                <div class="step completed">
                    <span class="checkmark">✓</span>
                </div>
                <div class="step-line"></div>
                <div class="step completed">
                    <span class="checkmark">✓</span>
                </div>
                <div class="step-line"></div>
                <div class="step completed">
                    <span class="checkmark">✓</span>
                </div>
                <div class="step-line"></div>
                <div class="step active">4</div>
                <div class="step-line"></div>
                <div class="step">5</div>
                <span class="step-label">Degree and School Preference</span>
            </div>

            <div class="form-card">
                <form>
                    <!-- Priority 1 -->
                    <div class="priority-section">
                        <h2>Priority 1:</h2>
                        <div class="preference-row">
                            <div class="form-group">
                                <label>Preferred School</label>
                                <input type="text" placeholder="Enter your preferred school" required>
                            </div>
                            <div class="form-group">
                                <label>Preferred Program</label>
                                <input type="text" placeholder="Enter your preferred program" required>
                            </div>
                        </div>
                    </div>

                    <!-- Priority 2 -->
                    <div class="priority-section">
                        <h2>Priority 2:</h2>
                        <div class="preference-row">
                            <div class="form-group">
                                <label>Preferred School</label>
                                <input type="text" placeholder="Enter your preferred school" required>
                            </div>
                            <div class="form-group">
                                <label>Preferred Program</label>
                                <input type="text" placeholder="Enter your preferred program" required>
                            </div>
                        </div>
                    </div>

                    <!-- Priority 3 -->
                    <div class="priority-section">
                        <h2>Priority 3:</h2>
                        <div class="preference-row">
                            <div class="form-group">
                                <label>Preferred School</label>
                                <input type="text" placeholder="Enter your preferred school" required>
                            </div>
                            <div class="form-group">
                                <label>Preferred Program</label>
                                <input type="text" placeholder="Enter your preferred program" required>
                            </div>
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="button" class="back-btn" onclick="window.location.href='educationaldesign.html'">Back</button>
                        <button type="button" class="next-btn" onclick="window.location.href='viewsubmitdesign.html'">Next</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
